# Development stack. Personal tweaks (other ports, extra mounts, TZ) go in a
# git-ignored compose.override.yaml — do not edit this file for local needs.
# Production uses compose.prod.yaml instead.
services:
  salix_app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: dev
    restart: unless-stopped
    container_name: salix_app
    hostname: salix_app
    ports:
      - "8000:8000" # Nginx: Symfony + built admin SPA
      - "4200:4200" # ng serve dev server (started via `npm run dev`)
    volumes:
      - .:/var/www/html
    networks:
      - salix

  salix_db:
    image: mysql:8
    restart: unless-stopped
    container_name: salix_db
    hostname: salix_db
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: 'salix'
    command: ['mysqld', '--character-set-server=utf8mb4', '--collation-server=utf8mb4_0900_ai_ci', '--skip-log-bin', '--innodb-buffer-pool-size=256M', '--innodb-log-buffer-size=128M', '--innodb-flush-method=O_DSYNC']
    volumes:
      - ./docker/temp/mysql:/var/lib/mysql
    networks:
      - salix

  salix_phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: unless-stopped
    container_name: salix_phpmyadmin
    hostname: salix_phpmyadmin
    environment:
      UPLOAD_LIMIT: '2G'
      PMA_PORT: 3306
      PMA_HOST: salix_db
      PMA_USER: root
      PMA_PASSWORD: secret
    networks:
      - salix

networks:
  salix:
    name: salix_network
