# Development stack. Personal tweaks (other ports, extra mounts, TZ) go in a
# git-ignored compose.override.yaml — do not edit this file for local needs.
# Production uses compose.prod.yaml instead.
services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: dev
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html

  db:
    image: mysql:8
    restart: unless-stopped
    # keep the monorepo's dev hostname so the default DATABASE_URL works
    container_name: salix_db
    hostname: salix_db
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: 'salix'
    command: ['mysqld', '--character-set-server=utf8mb4', '--collation-server=utf8mb4_0900_ai_ci', '--skip-log-bin']
    volumes:
      - ./docker/temp/mysql:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: unless-stopped
    container_name: salix_phpmyadmin
    hostname: salix_phpmyadmin
    environment:
      UPLOAD_LIMIT: '2G'
      PMA_PORT: 3306
      PMA_HOST: salix_db
      PMA_USER: root
      PMA_PASSWORD: secret
