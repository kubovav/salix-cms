server {
    listen 8000 default_server;
    server_name _;

    root /var/www/html/public;
    index index.php;

    absolute_redirect off;

    server_tokens off;

    client_max_body_size 512M;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    # Asset-mapper output (asset-map:compile) — filenames are content-hashed.
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Angular admin SPA (built into public/admin). Deep links fall back to its index.html.
    location /admin {
        index index.html;
        try_files $uri $uri/ /admin/index.html;

        # Production builds hash every bundle filename, so hashed assets may be
        # cached forever; index.html falls through to the no-cache default so
        # new releases are picked up on a plain reload.
        location ~* "-[A-Za-z0-9]{8,}\.(?:js|css|woff2?|ttf|eot|svg|png|jpe?g|gif|webp|ico)$" {
            try_files $uri =404;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        add_header Cache-Control "no-cache";
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_param HTTP_HOST $http_host;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }
}
