<div class="d-flex align-items-center justify-content-center min-vh-100 bg-body-tertiary">
  <div class="card shadow-sm" style="width: 22rem">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <i class="bi bi-layers-fill fs-1 text-primary"></i>
        <h1 class="h4 mt-2 mb-0">Salix CMS</h1>
        <p class="text-muted small mb-0">Sign in to the admin area</p>
      </div>

      @if (error()) {
        <div class="alert alert-danger py-2" role="alert">{{ error() }}</div>
      }

      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="mb-3">
          <label class="form-label" for="email">Email</label>
          <input
            id="email"
            type="email"
            class="form-control"
            formControlName="email"
            autocomplete="username"
          />
        </div>
        <div class="mb-3">
          <label class="form-label" for="password">Password</label>
          <input
            id="password"
            type="password"
            class="form-control"
            formControlName="password"
            autocomplete="current-password"
          />
        </div>
        <button type="submit" class="btn btn-primary w-100" [disabled]="submitting()">
          @if (submitting()) {
            <span class="spinner-border spinner-border-sm me-1"></span>
          }
          Sign in
        </button>
      </form>
    </div>
  </div>
</div>
