<h3 class="mb-4">Dashboard</h3>

<div class="row g-3">
  <div class="col-sm-6 col-lg-4">
    <div class="card text-bg-primary">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <div class="fs-2 fw-bold">{{ count() ?? '—' }}</div>
            <div>Articles</div>
          </div>
          <i class="bi bi-file-earmark-text fs-1 opacity-50"></i>
        </div>
      </div>
      <a routerLink="/articles" class="card-footer text-white text-decoration-none">
        Manage articles <i class="bi bi-arrow-right-circle ms-1"></i>
      </a>
    </div>
  </div>

  <div class="col-sm-6 col-lg-4">
    <div class="card text-bg-success">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <div class="fs-2 fw-bold">{{ published() ?? '—' }}</div>
            <div>Published</div>
          </div>
          <i class="bi bi-check-circle fs-1 opacity-50"></i>
        </div>
      </div>
      <a routerLink="/articles" class="card-footer text-white text-decoration-none">
        View published <i class="bi bi-arrow-right-circle ms-1"></i>
      </a>
    </div>
  </div>
</div>
