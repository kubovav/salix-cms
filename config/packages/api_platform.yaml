api_platform:
    title: Salix CMS Admin API
    version: 1.0.0
    # Application-level resources; the CMS's own resources are registered by
    # SalixCmsBundle (prepend).
    mapping:
        paths:
            - '%kernel.project_dir%/src/ApiResource'
            - '%kernel.project_dir%/src/Entity'
    # Session-cookie (same-origin) authentication is used for the admin SPA,
    # so requests must be stateful to allow the security token to persist.
    defaults:
        stateless: false
        pagination_enabled: false
        cache_headers:
            vary: ['Content-Type', 'Authorization', 'Origin']
    formats:
        json: ['application/json']
    error_formats:
        jsonproblem: ['application/problem+json']
        json: ['application/problem+json', 'application/json']
    docs_formats:
        jsonld: ['application/ld+json']
        json: ['application/json']
        html: ['text/html']
    enable_swagger: true
    enable_swagger_ui: true
    enable_re_doc: false

when@prod:
    api_platform:
        enable_swagger_ui: false
        show_webby: false
