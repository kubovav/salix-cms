# Site-specific routes (custom-site quarantine lane).
#
# Loaded automatically by the kernel alongside the other config/routes/*.yaml files.
# Keeping site routes here — instead of editing the CMS's config/routes.yaml — means
# CMS upgrades never conflict with your routing. Add controllers under src/Site/Controller/
# and annotate them with #[Route]; they are imported below.
site_controllers:
    resource:
        path: ../../src/Site/Controller/
        namespace: App\Site\Controller
    type: attribute
